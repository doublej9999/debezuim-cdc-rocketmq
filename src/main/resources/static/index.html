<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debezium CDC 管理平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .header-info {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-running {
            background: #d4edda;
            color: #155724;
        }

        .status-stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #dee2e6;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
            color: #666;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .monitor-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }

        .monitor-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .monitor-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #dee2e6;
        }

        .tab-button {
            padding: 10px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #666;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1>🚀 Debezium CDC 管理平台</h1>
            <div class="header-info">
                <div class="info-item">
                    <span>引擎状态:</span>
                    <span id="engineStatus" class="status-badge status-stopped">加载中...</span>
                </div>
                <div class="info-item">
                    <span>已处理事件:</span>
                    <span id="eventCount" style="font-weight: bold;">-</span>
                </div>
                <div class="info-item">
                    <span>当前 LSN:</span>
                    <span id="currentLsn" style="font-family: monospace;">-</span>
                </div>
                <div class="info-item">
                    <span>运行时长:</span>
                    <span id="uptime">-</span>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <div class="main-content">
            <!-- 左侧：配置表单 -->
            <div class="card">
                <h2>📝 新增数据源配置</h2>
                <div id="formAlert"></div>
                <form id="configForm">
                    <div class="form-group">
                        <label>配置名称 *</label>
                        <input type="text" id="configName" placeholder="例如: 生产库用户表" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>数据库主机 *</label>
                            <input type="text" id="dbHostname" placeholder="localhost" required>
                        </div>
                        <div class="form-group">
                            <label>数据库端口 *</label>
                            <input type="number" id="dbPort" placeholder="5432" value="5432" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>数据库名 *</label>
                            <input type="text" id="dbName" placeholder="postgres" required>
                        </div>
                        <div class="form-group">
                            <label>数据库用户 *</label>
                            <input type="text" id="dbUser" placeholder="postgres" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>数据库密码 *</label>
                        <input type="password" id="dbPassword" placeholder="输入密码" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Schema 名称 *</label>
                            <input type="text" id="schemaName" placeholder="public" required>
                        </div>
                        <div class="form-group">
                            <label>表名 *</label>
                            <input type="text" id="tableName" placeholder="users" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>RocketMQ Topic *</label>
                            <input type="text" id="rocketmqTopic" placeholder="cdc-events" required>
                        </div>
                        <div class="form-group">
                            <label>RocketMQ Tag</label>
                            <input type="text" id="rocketmqTag" placeholder="可选，如: users">
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">💾 保存配置</button>
                        <button type="reset" class="btn-secondary">🔄 重置</button>
                    </div>
                </form>
            </div>

            <!-- 右侧：监控信息 -->
            <div class="card">
                <h2>📊 系统监控</h2>
                <div id="monitorAlert"></div>
                <div class="monitor-grid">
                    <div class="monitor-item">
                        <div class="monitor-label">Debezium 引擎</div>
                        <div class="monitor-value" id="debeziumStatus">-</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-label">RocketMQ 生产者</div>
                        <div class="monitor-value" id="rocketmqStatus">-</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-label">数据库连接</div>
                        <div class="monitor-value" id="dbHost">-</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-label">RocketMQ NameServer</div>
                        <div class="monitor-value" id="rocketmqServer">-</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-label">当前 Topic</div>
                        <div class="monitor-value" id="currentTopic">-</div>
                    </div>
                    <div class="monitor-item">
                        <div class="monitor-label">启动时间</div>
                        <div class="monitor-value" id="startTime">-</div>
                    </div>
                </div>
                <button class="btn-primary" style="width: 100%; margin-top: 15px;" onclick="refreshMonitor()">🔄 刷新监控</button>
            </div>
        </div>

        <!-- 配置列表 -->
        <div class="card">
            <h2>📋 已保存的配置</h2>
            <div id="listAlert"></div>
            <div class="table-container">
                <table id="configTable">
                    <thead>
                        <tr>
                            <th>配置名称</th>
                            <th>数据库</th>
                            <th>Schema.表</th>
                            <th>Topic / Tag</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="configTableBody">
                        <tr>
                            <td colspan="7" class="empty-state">暂无配置，请添加新配置</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        const MONITOR_API = '/api/monitor';
        const DATASOURCE_API = '/api/datasource';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadConfigs();
            refreshMonitor();
            setInterval(refreshMonitor, 5000); // 每5秒刷新一次监控
        });

        // 表单提交
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const config = {
                name: document.getElementById('configName').value,
                dbHostname: document.getElementById('dbHostname').value,
                dbPort: parseInt(document.getElementById('dbPort').value),
                dbName: document.getElementById('dbName').value,
                dbUser: document.getElementById('dbUser').value,
                dbPassword: document.getElementById('dbPassword').value,
                schemaName: document.getElementById('schemaName').value,
                tableName: document.getElementById('tableName').value,
                rocketmqTopic: document.getElementById('rocketmqTopic').value,
                rocketmqTag: document.getElementById('rocketmqTag').value,
                isActive: false
            };

            try {
                const response = await fetch(DATASOURCE_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                if (response.ok) {
                    showAlert('formAlert', '✅ 配置保存成功！', 'success');
                    document.getElementById('configForm').reset();
                    loadConfigs();
                } else {
                    showAlert('formAlert', '❌ 保存失败，请检查输入', 'error');
                }
            } catch (error) {
                showAlert('formAlert', '❌ 网络错误: ' + error.message, 'error');
            }
        });

        // 加载配置列表
        async function loadConfigs() {
            try {
                const response = await fetch(DATASOURCE_API);
                const configs = await response.json();

                const tbody = document.getElementById('configTableBody');
                if (configs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无配置，请添加新配置</td></tr>';
                    return;
                }

                tbody.innerHTML = configs.map(config => `
                    <tr>
                        <td><strong>${config.name}</strong></td>
                        <td>${config.dbHostname}:${config.dbPort}/${config.dbName}</td>
                        <td>${config.schemaName}.${config.tableName}</td>
                        <td>${config.rocketmqTopic}${config.rocketmqTag ? ' / ' + config.rocketmqTag : ''}</td>
                        <td>
                            <span class="status-badge ${config.isActive ? 'status-running' : 'status-stopped'}">
                                ${config.isActive ? '✓ 活跃' : '○ 停用'}
                            </span>
                        </td>
                        <td>${new Date(config.createdAt).toLocaleString('zh-CN')}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-success btn-small" onclick="toggleConfig(${config.id})">
                                    ${config.isActive ? '⏸ 停用' : '▶ 启用'}
                                </button>
                                <button class="btn-danger btn-small" onclick="deleteConfig(${config.id})">🗑 删除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showAlert('listAlert', '❌ 加载配置失败: ' + error.message, 'error');
            }
        }

        // 切换配置状态
        async function toggleConfig(id) {
            try {
                const response = await fetch(`${DATASOURCE_API}/${id}/toggle`, {
                    method: 'POST'
                });

                if (response.ok) {
                    showAlert('listAlert', '✅ 状态已更新', 'success');
                    loadConfigs();
                } else {
                    showAlert('listAlert', '❌ 更新失败', 'error');
                }
            } catch (error) {
                showAlert('listAlert', '❌ 网络错误: ' + error.message, 'error');
            }
        }

        // 删除配置
        async function deleteConfig(id) {
            if (!confirm('确定要删除这个配置吗？')) return;

            try {
                const response = await fetch(`${DATASOURCE_API}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showAlert('listAlert', '✅ 配置已删除', 'success');
                    loadConfigs();
                } else {
                    showAlert('listAlert', '❌ 删除失败', 'error');
                }
            } catch (error) {
                showAlert('listAlert', '❌ 网络错误: ' + error.message, 'error');
            }
        }

        // 刷新监控信息
        async function refreshMonitor() {
            try {
                const response = await fetch(`${MONITOR_API}/status`);
                const data = await response.json();

                // 更新头部状态
                document.getElementById('engineStatus').textContent = data.running ? '✓ 运行中' : '○ 已停止';
                document.getElementById('engineStatus').className = `status-badge ${data.running ? 'status-running' : 'status-stopped'}`;
                document.getElementById('eventCount').textContent = data.processedEvents || 0;
                document.getElementById('currentLsn').textContent = data.currentLsn || '-';
                document.getElementById('uptime').textContent = formatUptime(data.uptimeSeconds || 0);

                // 更新监控面板
                document.getElementById('debeziumStatus').textContent = data.running ? '✓ 正常' : '✗ 停止';
                document.getElementById('rocketmqStatus').textContent = data.rocketmqProducerRunning ? '✓ 正常' : '✗ 异常';
                document.getElementById('dbHost').textContent = data.databaseHost || '-';
                document.getElementById('rocketmqServer').textContent = data.rocketmqNameServer || '-';
                document.getElementById('currentTopic').textContent = data.rocketmqTopic || '-';
                document.getElementById('startTime').textContent = data.startTime ? new Date(data.startTime).toLocaleString('zh-CN') : '-';
            } catch (error) {
                console.error('监控刷新失败:', error);
            }
        }

        // 格式化运行时长
        function formatUptime(seconds) {
            if (seconds < 60) return seconds + '秒';
            if (seconds < 3600) return Math.floor(seconds / 60) + '分钟';
            if (seconds < 86400) return Math.floor(seconds / 3600) + '小时';
            return Math.floor(seconds / 86400) + '天';
        }

        // 显示提示信息
        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            setTimeout(() => {
                alert.className = 'alert';
            }, 5000);
        }
    </script>
</body>
</html>
