server:
  port: 8082

spring:
  application:
    name: debezium-cdc-rocketmq

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true


# RocketMQ 配置
rocketmq:
  namesrv-addr: 45.128.210.102:9876
  producer-group: debezium-cdc-producer
  topic: cdc-events2
  send-msg-timeout: 3000
  retry-times-when-send-failed: 2
  max-message-size: 4194304

# 异步事件发送配置
async:
  event:
    queue:
      size: 10000  # 事件队列大小
    sender:
      threads: 4  # 发送线程数
      batch:
        size: 100  # 批处理大小
        timeout:
          ms: 5000  # 批处理超时（毫秒）
    retry:
      enabled: true  # 启用重试机制
      interval:
        seconds: 60  # 重试间隔（秒）


# 日志配置
logging:
  level:
    root: INFO
    com.example.cdc: DEBUG
    io.debezium: INFO
    org.apache.rocketmq: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
